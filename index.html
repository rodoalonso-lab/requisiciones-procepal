<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Requisiciones">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0A1628">
<title>Requisiciones — Procepal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A1628;--surface:#112240;--border:#1E3A5F;
  --accent:#5BC4C0;--text:#E8F4F8;--muted:#8BBFD4;--dim:#5A8FA8;
  --success:#5BC4C0;--danger:#EF4444;--warning:#F0A500;
  color-scheme:dark;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column}

/* LOGIN */
#login-view{display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;height:100%}
.pin-display{display:flex;justify-content:center;gap:12px;margin:24px 0 8px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);background:transparent;transition:all .2s}
.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:280px;margin:0 auto}
.num-btn{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;font-size:22px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Barlow',sans-serif;transition:all .1s}
.num-btn:active{background:var(--accent);color:#0A1628;transform:scale(.95)}
.num-btn.del{font-size:18px;color:var(--dim)}
.num-btn.empty{background:transparent;border:none;cursor:default}

/* MAIN */
#main-view{display:none;flex-direction:column;height:100%}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.top-bar-title{font-size:16px;font-weight:800;color:var(--accent)}
.top-bar-user{font-size:12px;color:var(--dim)}
.content{flex:1;overflow-y:auto;padding:16px}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.tab-btn{flex:1;padding:12px 8px;font-size:12px;font-weight:700;color:var(--dim);background:none;border:none;cursor:pointer;font-family:'Barlow',sans-serif;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
.card-label{font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.item-sub{font-size:12px;color:var(--dim);margin-top:3px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700}

/* FORM */
.form-group{margin-bottom:14px}
.form-label{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);font-family:'Barlow',sans-serif;outline:none}
.form-input:focus{border-color:var(--accent)}
textarea.form-input{resize:none;min-height:80px}

/* BUTTONS */
.btn-primary{width:100%;background:var(--accent);border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;color:#0A1628;cursor:pointer;font-family:'Barlow',sans-serif;margin-bottom:8px}
.btn-secondary{width:100%;background:none;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Barlow',sans-serif;margin-bottom:8px}
.btn-danger{width:100%;background:#EF444422;border:1px solid #EF444455;border-radius:10px;padding:12px;font-size:13px;font-weight:700;color:#EF4444;cursor:pointer;font-family:'Barlow',sans-serif}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--accent);cursor:pointer;font-family:'Barlow',sans-serif;font-weight:700}

/* SHEET */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end}
.sheet-overlay.open{display:flex}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:16px;width:100%;max-height:90vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-size:18px;font-weight:800;margin-bottom:16px}

/* ITEMS LIST */
.item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}

/* STATUS COLORS */
.s-pendiente{background:#F0A50022;color:#F0A500}
.s-cotizada{background:#3B9EBF22;color:#3B9EBF}
.s-autorizada{background:#5BC4C022;color:#5BC4C0}
.s-rechazada{background:#EF444422;color:#EF4444}
.s-comprada{background:#A78BFA22;color:#A78BFA}
.s-recibida{background:#5BC4C022;color:#5BC4C0}

.empty{text-align:center;padding:48px 16px;color:var(--dim)}
.empty-icon{font-size:40px;margin-bottom:12px}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1E3A5F;color:var(--text);padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:200;border:1px solid var(--border)}
.toast.show{opacity:1}
.toast.error{background:#EF444422;border-color:#EF4444;color:#EF4444}

.loading{position:fixed;inset:0;background:var(--bg);z-index:50;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

input[type="date"]{color-scheme:dark}
.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--accent);border-radius:0 0 10px 10px;z-index:50;max-height:180px;overflow-y:auto}
.autocomplete-item{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:active{background:var(--bg)}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.4)}

/* ── MOBILE OPTIMIZATIONS ── */
.btn-primary,.btn-secondary,.btn-danger{min-height:48px}
.btn-sm{min-height:36px}
.form-input{font-size:16px!important;min-height:48px} /* 16px prevents iOS zoom */
select.form-input{min-height:48px}
.num-btn{min-height:64px}
button{-webkit-user-select:none;user-select:none}
.card{cursor:default}

/* ── STATUS BADGE COLORS (case-insensitive via class) ── */
.s-pendiente{background:#F0A50022;color:#F0A500;border:1px solid #F0A50044}
.s-cotizada{background:#3B9EBF22;color:#3B9EBF;border:1px solid #3B9EBF44}
.s-autorizada{background:#10B98122;color:#10B981;border:1px solid #10B98144}
.s-rechazada{background:#EF444422;color:#EF4444;border:1px solid #EF444444}
.s-comprada{background:#A78BFA22;color:#A78BFA;border:1px solid #A78BFA44}
.s-recibida{background:#10B98122;color:#10B981;border:1px solid #10B98144}

/* ── PDF OVERLAY ── */
#pdf-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;overflow-y:auto;padding:16px 12px 40px}
#pdf-overlay.open{display:block}
#pdf-doc{background:#fff;color:#111;max-width:720px;margin:0 auto;padding:36px 40px;font-family:'Barlow',sans-serif;border-radius:8px}
.pdf-bar{max-width:720px;margin:0 auto 12px;display:flex;gap:10px}
.pdf-bar button{flex:1;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif}
.pdf-print-btn{background:#5BC4C0;color:#0A1628}
.pdf-close-btn{background:#1E3A5F;color:#E8F4F8}
@media print{
  body>*{display:none!important}
  #pdf-overlay{display:block!important;position:static!important;background:none!important;padding:0!important}
  .pdf-bar{display:none!important}
  #pdf-doc{border-radius:0!important;max-width:100%!important;padding:20px 28px!important}
}
</style>
</head>
<body>
<div id="app">

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--dim)">Cargando...</div>
</div>

<!-- LOGIN -->
<div id="login-view">
  <div style="text-align:center;margin-bottom:32px">
    <div style="font-size:40px;margin-bottom:8px">📋</div>
    <div style="font-size:24px;font-weight:800;color:var(--accent);letter-spacing:2px">PROCEPAL</div>
    <div style="font-size:12px;color:var(--dim);margin-top:4px">Requisiciones de obra</div>
  </div>
  <div class="pin-display">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div style="font-size:13px;color:var(--dim);margin-bottom:20px;text-align:center">Ingresa tu PIN</div>
  <div class="numpad">
    <button class="num-btn" onclick="pinPress('1')">1</button>
    <button class="num-btn" onclick="pinPress('2')">2</button>
    <button class="num-btn" onclick="pinPress('3')">3</button>
    <button class="num-btn" onclick="pinPress('4')">4</button>
    <button class="num-btn" onclick="pinPress('5')">5</button>
    <button class="num-btn" onclick="pinPress('6')">6</button>
    <button class="num-btn" onclick="pinPress('7')">7</button>
    <button class="num-btn" onclick="pinPress('8')">8</button>
    <button class="num-btn" onclick="pinPress('9')">9</button>
    <button class="num-btn empty"></button>
    <button class="num-btn" onclick="pinPress('0')">0</button>
    <button class="num-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div id="login-error" style="font-size:12px;color:var(--danger);margin-top:12px;text-align:center;min-height:18px"></div>
</div>

<!-- MAIN -->
<div id="main-view">
  <div class="top-bar">
    <div>
      <div class="top-bar-title">Requisiciones</div>
      <div class="top-bar-user" id="top-user">—</div>
    </div>
    <button onclick="logout()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:11px;color:var(--dim);cursor:pointer;font-family:Barlow,sans-serif">Salir</button>
  </div>
  <div class="tabs" id="tabs-bar">
    <button class="tab-btn active" onclick="setTab('mis')" id="tab-mis">📋 Mis requisiciones</button>
    <button class="tab-btn" onclick="setTab('todas')" id="tab-todas" style="display:none">📦 Todas</button>
    <button class="tab-btn" onclick="setTab('autorizar')" id="tab-autorizar" style="display:none">✅ Autorizar</button>
  </div>
  <div class="content" id="content"></div>
</div>

</div>

<!-- SHEET: Nueva requisición -->
<div class="sheet-overlay" id="sheet-nueva">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Nueva Requisición</div>
    <div class="form-group">
      <label class="form-label">Obra *</label>
      <select class="form-input" id="rq-obra"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Solicitante</label>
      <input class="form-input" id="rq-solicitante" type="text" placeholder="Tu nombre" readonly style="opacity:0.7;cursor:not-allowed;background:var(--surface)">
    </div>
    <div class="form-group">
      <label class="form-label">Urgencia</label>
      <select class="form-input" id="rq-urgencia">
        <option value="normal">Normal</option>
        <option value="urgente">🔴 Urgente</option>
        <option value="muy_urgente">🚨 Muy urgente</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha requerida</label>
      <input class="form-input" id="rq-fecha" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Notas generales</label>
      <textarea class="form-input" id="rq-notas" placeholder="Instrucciones especiales, lugar de entrega..."></textarea>
    </div>
    <div class="card-label" style="margin-bottom:10px">MATERIALES SOLICITADOS</div>
    <div id="rq-items-list" style="margin-bottom:8px"></div>
    <button class="btn-secondary" onclick="agregarItemForm()" style="margin-bottom:16px">+ Agregar material</button>
    <button class="btn-primary" id="rq-save-btn" onclick="saveRequisicion()">Enviar requisición</button>
    <button class="btn-secondary" onclick="closeSheet('nueva')">Cancelar</button>
    <div style="height:20px"></div>
  </div>
</div>

<!-- SHEET: Detalle requisición -->
<div class="sheet-overlay" id="sheet-detalle">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div id="detalle-content"></div>
    <div style="height:20px"></div>
  </div>
</div>

<!-- SHEET: Cotizar -->
<div class="sheet-overlay" id="sheet-cotizar">
  <div class="sheet" style="max-height:92vh;overflow-y:auto">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Cotización</div>
    <input type="hidden" id="cot-req-id">
    <input type="hidden" id="cot-monto-hidden" value="0">
    <div class="form-group">
      <label class="form-label">Proveedor *</label>
      <input class="form-input" id="cot-proveedor" type="text" placeholder="Nombre del proveedor">
    </div>
    <div class="card-label" style="margin-bottom:10px">PRECIOS POR MATERIAL</div>
    <div id="cot-items-wrap" style="margin-bottom:12px"></div>
    <div class="card" style="margin-bottom:16px;text-align:center">
      <div class="card-label">TOTAL COTIZACIÓN</div>
      <div id="cot-total-display" style="font-size:28px;font-weight:800;color:var(--accent)">$0</div>
    </div>
    <div class="form-group">
      <label class="form-label">Tiempo de entrega</label>
      <input class="form-input" id="cot-entrega" type="text" placeholder="Ej. 2 días hábiles">
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <textarea class="form-input" id="cot-notas" placeholder="Condiciones, descuentos..."></textarea>
    </div>
    <button class="btn-primary" id="cot-save-btn" onclick="saveCotizacion()">Guardar cotización</button>
    <button class="btn-secondary" onclick="closeSheet('cotizar')">Cancelar</button>
    <div style="height:20px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://pviiuaukqvrdyttwulcw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2aWl1YXVrcXZyZHl0dHd1bGN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTU0MzMsImV4cCI6MjA5NTA3MTQzM30.mKJ2z17zBkz0zc18itgEnJAk8ZuQ6nT3PlAvXyYRip8';

async function db(method, path, body) {
  const h = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
  const res = await fetch(SUPABASE_URL+'/rest/v1/'+path, {method, headers:h, body:body?JSON.stringify(body):undefined});
  const text = await res.text();
  if(!res.ok) throw new Error(text);
  return text ? JSON.parse(text) : null;
}

function showToast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show'+(err?' error':'');
  setTimeout(function(){ t.className='toast'; }, 2800);
}

// ── STATE ──────────────────────────────────────────────
var pin = '', currentUser = null, obrasData = [], reqData = [], curTab = 'mis', materialesFrecuentes = [];
var rqItems = []; // items in new req form

// ── PIN ───────────────────────────────────────────────
function pinPress(d) {
  if(pin.length >= 4) return;
  pin += d;
  updateDots();
  if(pin.length === 4) setTimeout(verificarPin, 150);
}
function pinDel() {
  pin = pin.slice(0,-1);
  updateDots();
  document.getElementById('login-error').textContent = '';
}
function updateDots() {
  for(var i=0;i<4;i++)
    document.getElementById('dot-'+i).className = 'pin-dot'+(i<pin.length?' filled':'');
}

async function verificarPin() {
  try {
    // Check against perfiles using pin_checador field on trabajadores... 
    // Actually use perfiles with a pin field — we'll use pin_checador from trabajadores
    // For management users (compras, director) we need a separate pin
    // Solution: store pin in perfiles table
    var perfiles = await db('GET','perfiles?pin_app=eq.'+pin);
    if(!perfiles || !perfiles.length) {
      // Try trabajadores for field workers
      var trabs = await db('GET','trabajadores?pin_checador=eq.'+pin+'&activo=eq.true');
      if(!trabs || !trabs.length) {
        document.getElementById('login-error').textContent = 'PIN incorrecto';
        pin=''; updateDots(); return;
      }
      currentUser = {id:trabs[0].id, nombre:trabs[0].nombre, rol:'campo', tipo:'trabajador', obra_id:trabs[0].obra_id, todos_proyectos:trabs[0].todos_proyectos};
    } else {
      var p = perfiles[0];
      currentUser = {id:p.user_id, nombre:p.nombre, rol:p.rol, tipo:'perfil', permisos:p.permisos||{}};
    }
    obrasData = await db('GET','obras?order=nombre') || [];
    try{ materialesFrecuentes = await db('GET','materiales_frecuentes?order=usos.desc,nombre.asc') || []; }catch(e){ materialesFrecuentes=[]; }
    var _isAdmin = currentUser.rol==='admin'||currentUser.rol==='director';
    var _isCompras = currentUser.rol==='compras';
    var _allReqs = await db('GET','requisiciones?order=created_at.desc') || [];
    reqData = (_isAdmin||_isCompras) ? _allReqs : _filtrarMisReqs(_allReqs);
    mostrarMain();
  } catch(e) {
    document.getElementById('login-error').textContent = 'Error de conexión';
    pin=''; updateDots();
  }
}

function logout() {
  currentUser=null; pin=''; updateDots();
  document.getElementById('main-view').style.display='none';
  document.getElementById('login-view').style.display='flex';
}

// ── MAIN ──────────────────────────────────────────────
function mostrarMain() {
  document.getElementById('login-view').style.display='none';
  document.getElementById('main-view').style.display='flex';
  document.getElementById('top-user').textContent = currentUser.nombre + ' · ' + rolLabel(currentUser.rol);
  var isCompras = currentUser.rol==='compras';
  var isDir = currentUser.rol==='admin'||currentUser.rol==='director';
  // Tab "Todas" visible para compras y admin/director
  document.getElementById('tab-todas').style.display = (isCompras||isDir) ? '' : 'none';
  // Tab "Autorizar" solo para admin/director
  document.getElementById('tab-autorizar').style.display = isDir ? '' : 'none';
  // Rename "Mis requisiciones" tab label based on role
  document.getElementById('tab-mis').textContent = '📋 Mis requisiciones';
  setTab('mis');
}

function rolLabel(rol) {
  var labels = {admin:'Admin',director:'Director',campo:'Campo',compras:'Compras',taller:'Taller',rrhh:'RRHH'};
  return labels[rol]||rol;
}

function setTab(tab) {
  curTab = tab;
  ['mis','todas','autorizar'].forEach(function(t){
    var btn = document.getElementById('tab-'+t);
    if(btn) btn.className = 'tab-btn'+(t===tab?' active':'');
  });
  renderContent();
}

async function loadData() {
  var isAdmin = currentUser.rol==='admin'||currentUser.rol==='director';
  var isCompras = currentUser.rol==='compras';
  // Always load all for admin/compras; load all and filter client-side for others
  // (solicitante_id may not always match perfectly across tables)
  reqData = await db('GET','requisiciones?order=created_at.desc') || [];
  if(!isAdmin && !isCompras) {
    reqData = _filtrarMisReqs(reqData);
  }
}

function _filtrarMisReqs(all) {
  var nombre = (currentUser.nombre||'').toLowerCase().trim();
  return all.filter(function(r){
    // The table uses a plain text 'solicitante' field
    var sol = (r.solicitante||r.solicitante||r.solicitante_nombre||'').toLowerCase().trim();
    return sol === nombre;
  });
}

// ── RENDER ─────────────────────────────────────────────
function renderContent() {
  var el = document.getElementById('content');
  var reqs = [];
  var isAdmin = currentUser.rol==='admin'||currentUser.rol==='director';
  var isCompras = currentUser.rol==='compras';

  if(curTab==='mis') {
    var isAdminR = currentUser.rol==='admin'||currentUser.rol==='director';
    var isComprasR = currentUser.rol==='compras';
    // For regular users: double-filter even if loadData already filtered (safety net)
    reqs = (isAdminR||isComprasR) ? [] : _filtrarMisReqs(reqData);
    // Admin/compras use "Todas" tab — "Mis" shows only their own submissions
    if(isAdminR||isComprasR) reqs = _filtrarMisReqs(reqData);
    var btnNueva = '<button class="btn-primary" onclick="abrirNueva()" style="margin-bottom:16px">+ Nueva requisición</button>';
    el.innerHTML = btnNueva + renderReqs(reqs, 'mis');
  } else if(curTab==='todas') {
    // Admin and compras see all requisitions
    reqs = reqData;
    el.innerHTML = renderReqs(reqs, 'todas');
  } else if(curTab==='autorizar') {
    // Director sees cotizadas pending authorization
    reqs = reqData.filter(function(r){ return (r.estado||'').toLowerCase()==='cotizada'; });
    el.innerHTML = '<div style="font-size:13px;color:var(--dim);margin-bottom:16px">Requisiciones cotizadas pendientes de autorización</div>' + renderReqs(reqs, 'autorizar');
  }
}

function renderReqs(reqs, mode) {
  if(!reqs.length) {
    return '<div class="empty"><div class="empty-icon">📋</div><div style="font-weight:700;margin-bottom:6px">Sin requisiciones</div><div class="item-sub">'+
      (mode==='mis'?'Toca "+ Nueva requisición" para solicitar materiales':'No hay requisiciones en este estado')+
    '</div></div>';
  }
  var urgColors = {urgente:'#F0A500',muy_urgente:'#EF4444'};
  return reqs.map(function(r){
    var obra = obrasData.find(function(o){ return o.id===r.obra_id; });
    var urg = r.urgencia && r.urgencia!=='normal' ? '<span style="color:'+urgColors[r.urgencia]+';font-size:11px;font-weight:700"> '+( r.urgencia==='urgente'?'🔴 URGENTE':'🚨 MUY URGENTE')+'</span>' : '';
    var tipoBadge = (r.tipo||'campo')==='taller'
      ? '<span style="font-size:10px;font-weight:700;color:#A78BFA;background:#A78BFA22;border:1px solid #A78BFA44;border-radius:10px;padding:2px 8px;display:inline-block;margin-top:3px">🔧 Taller</span>'
      : '<span style="font-size:10px;font-weight:700;color:#5BC4C0;background:#5BC4C022;border:1px solid #5BC4C044;border-radius:10px;padding:2px 8px;display:inline-block;margin-top:3px">🏗 Campo</span>';
    return '<div class="card" onclick="verDetalle(\''+r.id+'\')" style="cursor:pointer">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">'
      +'<div><div style="font-size:14px;font-weight:700">'+fmtFolio(r)+'</div>'
      +'<div class="item-sub">'+(obra?obra.nombre:'—')+'</div>'
      +'<div class="item-sub">'+(r.solicitante||r.solicitante_nombre||'—')+(r.fecha_requerida?' · Req: '+fmtDate(r.fecha_requerida):'')+'</div>'
      +'</div>'
      +'<div style="text-align:right">'+reqBadge(r.estado)+urg+tipoBadge+'</div>'
      +'</div>'
      +(r.notas?'<div style="font-size:12px;color:var(--dim);margin-top:4px">'+r.notas+'</div>':'')
      +'</div>';
  }).join('');
}

function fmtDate(d) {
  if(!d) return '—';
  var dt = d.includes('T') ? new Date(d) : new Date(d+'T12:00:00');
  if(isNaN(dt)) return '—';
  var meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return dt.getDate()+' '+meses[dt.getMonth()]+' '+dt.getFullYear();
}

function fmtFolio(r) {
  if(!r) return '—';
  var f = r.folio ? r.folio.toString() : '';
  if(f.startsWith('REQ-')) return f;
  if(f) return 'REQ-'+f;
  return 'REQ-'+r.id.slice(0,6).toUpperCase();
}

var _reqColors = {pendiente:'#F59E0B','en comparativa':'#3B82F6',cotizada:'#3B9EBF',autorizada:'#10B981',rechazada:'#EF4444',comprada:'#A78BFA',recibida:'#10B981'};
function reqBadge(estado) {
  var e = (estado||'pendiente').toLowerCase();
  var color = _reqColors[e] || '#8B949E';
  var label = e.charAt(0).toUpperCase()+e.slice(1);
  return '<span style="display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;background:'+color+'22;color:'+color+';border:1px solid '+color+'55">'+label+'</span>';
}

async function verDetalle(reqId) {
  var r = reqData.find(function(x){ return x.id===reqId; });
  if(!r) return;
  var items = [];
  try { items = await db('GET','requisicion_items?select=*&requisicion_id=eq.'+reqId) || []; } catch(e){}
  var obra = obrasData.find(function(o){ return o.id===r.obra_id; });
  var isDir = currentUser.rol==='admin'||currentUser.rol==='director';
  var isCompras = currentUser.rol==='compras';

  var html = '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">'
    +'<div><div style="font-size:20px;font-weight:800">'+fmtFolio(r)+'</div>'
    +'<div class="item-sub">'+(obra?obra.nombre:'—')+'</div>'
    +'<div class="item-sub">'+r.solicitante||r.solicitante_nombre+' · '+fmtDate(r.created_at)+'</div></div>'
    +reqBadge(r.estado)
    +'</div>';

  if(r.urgencia && r.urgencia!=='normal')
    html += '<div style="background:#EF444415;border:1px solid #EF444433;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;font-weight:700;color:#EF4444">'+(r.urgencia==='urgente'?'🔴 URGENTE':'🚨 MUY URGENTE')+'</div>';

  if(r.fecha_requerida)
    html += '<div class="item-sub" style="margin-bottom:12px">📅 Requerido para: <b>'+fmtDate(r.fecha_requerida)+'</b></div>';

  if(r.notas)
    html += '<div class="card" style="margin-bottom:12px"><div class="card-label">NOTAS</div><div style="font-size:13px">'+r.notas+'</div></div>';

  // Items
  html += '<div class="card-label">MATERIALES SOLICITADOS</div>';
  if(!items.length) html += '<div class="item-sub" style="margin-bottom:12px">Sin items</div>';
  else {
    html += '<div style="margin-bottom:12px">';
    items.forEach(function(it){
      html += '<div class="item-row"><div style="flex:1"><div style="font-size:13px;font-weight:700">'+(it.nombre_material||it.descripcion||'—')+'</div>'
        +(it.especificaciones?'<div class="item-sub">'+it.especificaciones+'</div>':'')+'</div>'
        +'<div style="text-align:right;font-size:13px;font-weight:700">'+it.cantidad+' '+it.unidad+'</div></div>';
    });
    html += '</div>';
  }

  // Cotización info
  if(r.proveedor) {
    html += '<div class="card" style="margin-bottom:12px">'
      +'<div class="card-label">COTIZACIÓN</div>'
      +'<div style="font-size:15px;font-weight:700">'+r.proveedor+'</div>'
      +'<div style="font-size:22px;font-weight:800;color:var(--accent);margin:4px 0">$'+parseFloat(r.monto_cotizado||0).toLocaleString()+'</div>'
      +(r.tiempo_entrega?'<div class="item-sub">⏱ '+r.tiempo_entrega+'</div>':'')
      +(r.notas_cotizacion?'<div class="item-sub">'+r.notas_cotizacion+'</div>':'')
      +'</div>';
  }

  // Actions
  var est = (r.estado||'pendiente').toLowerCase();
  if(isDir && est==='cotizada') {
    html += '<button class="btn-primary" style="background:#10B981;margin-bottom:8px" onclick="autorizarReq(\''+reqId+'\')">✓ Autorizar compra</button>';
    html += '<button class="btn-danger" style="margin-bottom:8px" onclick="rechazarReq(\''+reqId+'\')">✗ Rechazar</button>';
  }
  if(isCompras && est==='pendiente') {
    html += '<button class="btn-secondary" style="margin-bottom:8px" onclick="closeSheet(\'detalle\');abrirCotizar(\''+reqId+'\')">💰 Cotizar</button>';
  }
  if(isCompras && est==='autorizada') {
    html += '<button class="btn-primary" style="margin-bottom:8px" onclick="marcarComprada(\''+reqId+'\')">🛒 Marcar como comprada</button>';
  }

  if(est==='comprada' && (currentUser.tipo==='trabajador'||(r.solicitante||'').toLowerCase()===(currentUser.nombre||'').toLowerCase())) {
    html += '<button class="btn-primary" onclick="confirmarRecepcion(\''+reqId+'\')">✅ Confirmar recepción</button>';
  }
  // Show delete button for admin or own pending requisition
  var esMia = (r.solicitante||'').toLowerCase()===(currentUser.nombre||'').toLowerCase();
  var canDelete = currentUser.rol==='admin'||currentUser.rol==='director'||(esMia&&est==='pendiente');
  // Edit button — own pending reqs only
  if(esMia && est==='pendiente') {
    html += '<button class="btn-secondary" style="margin-bottom:8px" onclick="closeSheet(\'detalle\');abrirEditar(\''+reqId+'\')">✏️ Editar requisición</button>';
  }

  html += '<button class="btn-sm" style="width:100%;padding:10px;border-radius:10px;background:#3B82F622;border:1px solid #3B82F644;color:#3B82F6;font-size:13px;font-weight:700;margin-bottom:8px" onclick="generarPDF(\''+reqId+'\')">📄 Generar PDF</button>';
  html += '<button class="btn-secondary" onclick="closeSheet(\'detalle\')" style="margin-top:4px">Cerrar</button>';

  document.getElementById('detalle-content').innerHTML = html;
  openSheet('detalle');
}

async function saveRequisicion() {
  if(!rqItems.length) { showToast('Agrega al menos un material',true); return; }
  var validos = rqItems.filter(function(it){ return it.descripcion.trim(); });
  if(!validos.length) { showToast('Escribe la descripción del material',true); return; }
  var btn = document.getElementById('rq-save-btn');
  btn.textContent='Enviando...'; btn.disabled=true;
  try {
    var anio = new Date().getFullYear();
    var todasReqs = [];
    try { todasReqs = await db('GET','requisiciones?order=created_at.asc') || []; } catch(e){}
    var desteAnio = todasReqs.filter(function(x){ return x.folio && x.folio.toString().startsWith('REQ-'+anio+'-'); });
    var folio = 'REQ-'+anio+'-'+String(desteAnio.length+1).padStart(3,'0');
    var payload = {
      folio: folio,
      obra_id: document.getElementById('rq-obra').value,
      solicitante: currentUser.nombre,
      urgencia: document.getElementById('rq-urgencia').value,
      fecha_requerida: document.getElementById('rq-fecha').value||null,
      notas: document.getElementById('rq-notas').value.trim(),
      estado: 'pendiente',
      tipo: (currentUser.rol==='taller') ? 'taller' : 'campo'
    };
    var rows = await db('POST','requisiciones',payload);
    var reqId = rows[0].id;
    for(var i=0;i<validos.length;i++){
      var it = validos[i];
      await db('POST','requisicion_items',{
        requisicion_id:reqId,
        nombre_material:it.descripcion.trim(),
        cantidad:parseFloat(it.cantidad)||1,
        unidad:it.unidad||'pza'
      });
    }
    // WhatsApp notification
    var obra = obrasData.find(function(o){ return o.id===payload.obra_id; });
    var msg = '📋 *Nueva Requisición '+folio+'*\n'
      +'🏗 Obra: '+(obra?obra.nombre:'—')+'\n'
      +'👤 Solicitante: '+currentUser.nombre+'\n'
      +(payload.urgencia!=='normal'?'🔴 *'+payload.urgencia.toUpperCase()+'*\n':'')
      +'📦 Materiales:\n'
      +validos.map(function(it,i){ return (i+1)+'. '+it.descripcion.trim()+' - '+it.cantidad+' '+(it.unidad||'pza'); }).join('\n');
    var waUrl = 'https://wa.me/524498043514?text='+encodeURIComponent(msg);
    await guardarMaterialesFrecuentes(validos);
    showToast('✅ Requisición enviada');
    closeSheet('nueva');
    await loadData();
    renderContent();
    setTimeout(function(){ window.open(waUrl,'_blank'); }, 1000);
  } catch(e){ showToast('Error: '+e.message,true); }
  btn.textContent='Enviar requisición'; btn.disabled=false;
}

// ── MATERIALES FRECUENTES ─────────────────────────────
function filtrarMat(i) {
  var val = document.getElementById('mat-input-'+i).value.trim().toLowerCase();
  var lista = document.getElementById('mat-list-'+i);
  if(!val || val.length < 2) { lista.style.display='none'; return; }
  var filtrados = materialesFrecuentes.filter(function(m){
    return m.nombre.toLowerCase().includes(val);
  }).slice(0,8);
  if(!filtrados.length) { lista.style.display='none'; return; }
  lista.innerHTML = filtrados.map(function(m){
    return '<div class="autocomplete-item" onclick="seleccionarMat('+i+',\''+m.nombre.replace(/'/g,'')+'\')">'+m.nombre+'<span style="float:right;font-size:10px;color:var(--dim)">'+m.usos+'x</span></div>';
  }).join('');
  lista.style.display = 'block';
}

function seleccionarMat(i, nombre) {
  rqItems[i].descripcion = nombre;
  var inp = document.getElementById('mat-input-'+i);
  if(inp) inp.value = nombre;
  var lista = document.getElementById('mat-list-'+i);
  if(lista) lista.style.display = 'none';
}

async function guardarMaterialesFrecuentes(items) {
  for(var i=0; i<items.length; i++) {
    var nom = items[i].descripcion.trim();
    if(!nom) continue;
    var existe = materialesFrecuentes.find(function(m){ return m.nombre.toLowerCase()===nom.toLowerCase(); });
    try {
      if(existe) {
        await db('PATCH','materiales_frecuentes?id=eq.'+existe.id,{usos:(existe.usos||0)+1});
      } else {
        await db('POST','materiales_frecuentes',{nombre:nom, usos:1});
      }
    } catch(e) {}
  }
  // Reload cache

function calcCotTotal() {
  var totalBruto=0, totalDesc=0, totalSinIva=0, totalIva=0, totalConIva=0;
  document.querySelectorAll('.fc-precio-unit').forEach(function(inp){
    var precio=parseFloat(inp.value)||0;
    var cant=parseFloat(inp.dataset.cant)||1;
    var idx=inp.dataset.idx;
    var descPct=parseFloat((document.querySelector('.fc-desc-pct[data-idx="'+idx+'"]')||{}).value)||0;
    var ivaSel=document.querySelector('.fc-iva-sel[data-idx="'+idx+'"]');
    var ivaPct=ivaSel?parseFloat(ivaSel.value)||0:16;
    var bruto=precio*cant;
    var descMonto=bruto*(descPct/100);
    var sub=bruto-descMonto;
    var iva=sub*(ivaPct/100);
    var total=sub+iva;
    totalBruto+=bruto; totalDesc+=descMonto; totalSinIva+=sub; totalIva+=iva; totalConIva+=total;
    var descEl=document.getElementById('cot-desc-'+idx);
    var subEl=document.getElementById('cot-sub-'+idx);
    var ivaEl=document.getElementById('cot-iva-'+idx);
    if(descEl) descEl.textContent=descMonto>0?'-$'+descMonto.toLocaleString('es-MX',{minimumFractionDigits:2}):'$0';
    if(subEl) subEl.textContent='$'+sub.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
    if(ivaEl) ivaEl.textContent='$'+total.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
  });
  var fmt2=function(n){ return '$'+n.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}); };
  var el=document.getElementById('cot-total-display');
  if(el) el.innerHTML=
    '<div style="font-size:28px;font-weight:800;color:var(--accent)">'+fmt2(totalConIva)+'</div>'
    +'<div style="display:flex;flex-direction:column;gap:3px;margin-top:8px;font-size:12px">'
    +(totalDesc>0?'<div style="display:flex;justify-content:space-between"><span style="color:var(--dim)">Subtotal bruto</span><span>'+fmt2(totalBruto)+'</span></div>':'')
    +(totalDesc>0?'<div style="display:flex;justify-content:space-between"><span style="color:#EF4444">Descuentos</span><span style="color:#EF4444">-'+fmt2(totalDesc)+'</span></div>':'')
    +'<div style="display:flex;justify-content:space-between"><span style="color:var(--dim)">Subtotal s/IVA</span><span>'+fmt2(totalSinIva)+'</span></div>'
    +'<div style="display:flex;justify-content:space-between"><span style="color:var(--dim)">IVA</span><span>+'+fmt2(totalIva)+'</span></div>'
    +'<div style="display:flex;justify-content:space-between;font-weight:800;border-top:1px solid var(--border);padding-top:4px;margin-top:2px"><span>Total c/IVA</span><span style="color:var(--accent)">'+fmt2(totalConIva)+'</span></div>'
    +'</div>';
  var hidden=document.getElementById('cot-monto-hidden');
  if(hidden) hidden.value=totalConIva;
}

async function confirmarRecepcion(reqId) {
  _recepReqId = reqId;
  var r = reqData.find(function(x){ return x.id===reqId; });

  // Load pending items
  var items = [];
  var itemsError = null;
  try { 
    var res = await db('GET','requisicion_items?select=*&requisicion_id=eq.'+reqId);
    items = res || [];
  } catch(e){ itemsError = e.message; }

  var recepciones = [];
  try { recepciones = await db('GET','recepciones?requisicion_id=eq.'+reqId) || []; } catch(e){}

  // Build items checklist
  var itemsHtml = '';
  if(itemsError) {
    itemsHtml = '<div style="color:#EF4444;font-size:12px;margin-bottom:8px">Error: '+itemsError+'</div>';
  } else if(!items.length) {
    itemsHtml = '<div style="color:var(--dim);font-size:12px;margin-bottom:8px">No se encontraron materiales en la tabla requisicion_items para esta requisición.</div>';
  } else {
    itemsHtml = items.map(function(it,i){
      var nom = it.nombre_material||it.descripcion||'—';
      var recibido = recepciones.filter(function(rc){ return (rc.nombre_material||'').toLowerCase()===nom.toLowerCase(); })
        .reduce(function(s,rc){ return s+(rc.cantidad_recibida||0); },0);
      var pendiente = Math.max(0,(it.cantidad||0)-recibido);
      if(pendiente<=0) return '';
      return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px">'
        +'<div style="display:flex;justify-content:space-between;align-items:center">'
        +'<div><div style="font-size:13px;font-weight:700">'+nom+'</div>'
        +'<div style="font-size:11px;color:var(--dim)">Solicitado: '+it.cantidad+' · Ya recibido: '+recibido+' · <span style="color:#F59E0B;font-weight:700">Pendiente: '+pendiente+' '+(it.unidad||'pza')+'</span></div>'
        +'</div>'
        +'<input type="checkbox" id="recep-inc-'+i+'" checked style="width:20px;height:20px;cursor:pointer">'
        +'</div>'
        +'<div style="display:flex;gap:8px;margin-top:8px">'
        +'<div style="flex:2"><div style="font-size:10px;font-weight:700;color:var(--dim);text-transform:uppercase;margin-bottom:4px">Cant. que llega</div>'
        +'<input class="form-input" type="number" id="recep-cant-'+i+'" value="'+pendiente+'" min="0" step="any"></div>'
        +'<div style="flex:1;display:flex;align-items:flex-end;padding-bottom:4px;font-size:13px;font-weight:700;color:var(--dim)">'+(it.unidad||'pza')+'</div>'
        +'</div>'
        +'<input type="hidden" id="recep-nom-'+i+'" value="'+nom+'">'
        +'<input type="hidden" id="recep-unidad-'+i+'" value="'+(it.unidad||'pza')+'"></div>';
    }).join('');
    if(!itemsHtml.trim()) { showToast('Todos los materiales ya fueron recibidos'); return; }
  }

  // Build nombres datalist
  var nombres = getNombresRecibio();
  var datalist = '<datalist id="recibio-list">'+nombres.map(function(n){ return '<option value="'+n+'">'; }).join('')+'</datalist>';

  document.getElementById('recep-items-wrap').innerHTML = datalist + itemsHtml;
  document.getElementById('recep-recibio').value = currentUser.nombre||'';
  document.getElementById('recep-ubicacion').value = 'Almacén central';
  document.getElementById('recep-factura').value = '';
  document.getElementById('recep-parcial').checked = false;
  document.getElementById('recep-req-id').value = reqId;
  openSheet('recep');
}

async function saveRecepcion() {
  var reqId = document.getElementById('recep-req-id').value;
  var recibio = document.getElementById('recep-recibio').value.trim();
  var ubicacion = document.getElementById('recep-ubicacion').value;
  var factura = document.getElementById('recep-factura').value.trim();
  var parcial = document.getElementById('recep-parcial').checked;
  if(!recibio){ showToast('Indica quién recibe',true); return; }

  var btn = document.getElementById('recep-save-btn');
  btn.textContent='Guardando...'; btn.disabled=true;

  try {
    var fecha = new Date().toISOString().slice(0,10);
    // Save each checked item
    for(var i=0;i<20;i++){
      var inc = document.getElementById('recep-inc-'+i);
      var nom = document.getElementById('recep-nom-'+i);
      var cant = document.getElementById('recep-cant-'+i);
      var unidad = document.getElementById('recep-unidad-'+i);
      if(!inc||!nom) break;
      if(inc.checked && parseFloat(cant.value)>0){
        await db('POST','recepciones',{
          requisicion_id:reqId,
          nombre_material:nom.value,
          cantidad_recibida:parseFloat(cant.value),
          recibio:recibio,
          ubicacion:ubicacion,
          factura:factura||null,
          fecha:fecha
        });
      }
    }
    // Update req status
    if(!parcial) await db('PATCH','requisiciones?id=eq.'+reqId,{estado:'recibida'});
    saveNombreRecibio(recibio);
    showToast('✅ Recepción registrada');
    closeSheet('recep');
    await loadData(); renderContent();
  } catch(e){ showToast('Error: '+e.message,true); }
  btn.textContent='Confirmar recepción'; btn.disabled=false;
}

    +(r.fecha_requerida?'<div style="background:#FFF7ED;border:1px solid #F59E0B44;border-radius:10px;padding:14px"><div style="font-size:10px;font-weight:700;letter-spacing:1px;color:#9CA3AF;text-transform:uppercase;margin-bottom:6px">Fecha Requerida</div><div style="font-size:15px;font-weight:700;color:#F59E0B">'+fmtDate(r.fecha_requerida)+'</div></div>':'')
    +(r.notas?'<div style="background:#F9FAFB;border-radius:10px;padding:14px'+(r.fecha_requerida?'':';grid-column:1/-1')+'">'
      +'<div style="font-size:10px;font-weight:700;letter-spacing:1px;color:#9CA3AF;text-transform:uppercase;margin-bottom:6px">Notas</div>'
      +'<div style="font-size:13px;color:#374151">'+r.notas+'</div></div>':'')
    +(r.proveedor?'<div style="background:#F0FDF4;border:1px solid #10B98144;border-radius:10px;padding:14px;grid-column:1/-1">'
      +'<div style="font-size:10px;font-weight:700;letter-spacing:1px;color:#9CA3AF;text-transform:uppercase;margin-bottom:6px">Proveedor / Cotización</div>'
      +'<div style="font-size:15px;font-weight:700;color:#10B981">'+r.proveedor+'</div>'
      +(r.monto_cotizado?'<div style="font-size:20px;font-weight:800;color:#10B981;margin-top:2px">$'+parseFloat(r.monto_cotizado).toLocaleString('es-MX')+'</div>':'')
      +(r.tiempo_entrega?'<div style="font-size:12px;color:#6B7280;margin-top:2px">Entrega: '+r.tiempo_entrega+'</div>':'')
      +'</div>':'')
    +'</div>'
    +'<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:#9CA3AF;text-transform:uppercase;margin-bottom:10px">Materiales Solicitados</div>'
    +'<table style="width:100%;border-collapse:collapse;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden">'
    +'<thead><tr style="background:#F3F4F6">'
    +'<th style="padding:9px 10px;text-align:left;font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase">Material</th>'
    +'<th style="padding:9px 10px;text-align:center;font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase">Solicitado</th>'
    +'<th style="padding:9px 10px;text-align:center;font-size:11px;font-weight:700;color:#10B981;text-transform:uppercase">Recibido</th>'
    +'<th style="padding:9px 10px;text-align:center;font-size:11px;font-weight:700;color:#F59E0B;text-transform:uppercase">Pendiente</th>'
    +'<th style="padding:9px 10px;text-align:center;font-size:11px;font-weight:700;color:#6B7280;text-transform:uppercase">Avance</th>'
    +'</tr></thead><tbody>'+itemsRows+'</tbody></table></div>'
    +'<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:700;letter-spacing:1.5px;color:#9CA3AF;text-transform:uppercase;margin-bottom:10px">Historial de Recepciones</div>'
    +'<table style="width:100%;border-collapse:collapse;border:1px solid #E5E7EB;border-radius:8px;overflow:hidden">'
    +'<thead><tr style="background:#F3F4F6">'
    +'<th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase">Material</th>'
    +'<th style="padding:8px 10px;text-align:center;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase">Cant.</th>'
    +'<th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase">Recibió</th>'
    +'<th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase">Ubicación</th>'
    +'<th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:#0D9488;text-transform:uppercase">Factura/Rem.</th>'
    +'<th style="padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase">Fecha</th>'
    +'</tr></thead><tbody>'+recepRows+'</tbody></table></div>'
    +'<div style="border-top:1px solid #E5E7EB;padding-top:14px;display:flex;justify-content:space-between">'
    +'<div style="font-size:10px;color:#9CA3AF">PROCEPAL — Sistema de Requisiciones · '+folio+'</div>'
    +'<div style="font-size:10px;color:#9CA3AF">'+now+'</div></div>';

  document.getElementById('pdf-overlay').classList.add('open');
  document.getElementById('pdf-overlay').scrollTop=0;
}

// ── SHEETS ────────────────────────────────────────────
function openSheet(id) { document.getElementById('sheet-'+id).classList.add('open'); }
function closeSheet(id) { document.getElementById('sheet-'+id).classList.remove('open'); }

// ── INIT ──────────────────────────────────────────────
document.getElementById('loading').style.display='none';
document.getElementById('login-view').style.display='flex';
// ── PWA SERVICE WORKER ───────────────────────────────
if('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/sw.js').then(function(reg) {
      // Detectar actualización disponible
      reg.addEventListener('updatefound', function() {
        var newWorker = reg.installing;
        newWorker.addEventListener('statechange', function() {
          if(newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showToast('🔄 Nueva versión disponible — recarga para actualizar');
          }
        });
      });
    });
  });
}
</script>

<!-- SHEET: Confirmar eliminar -->
<div class="sheet-overlay" id="sheet-confirm-del">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" style="color:#EF4444">🗑 Eliminar requisición</div>
    <div id="confirm-del-msg" style="font-size:14px;color:var(--dim);margin-bottom:20px">¿Estás seguro?</div>
    <button class="btn-primary" id="confirm-del-btn" style="background:#EF4444;margin-bottom:10px" onclick="doEliminarReq()">Sí, eliminar</button>
    <button class="btn-secondary" onclick="closeSheet('confirm-del')">Cancelar</button>
    <div style="height:20px"></div>
  </div>
</div>

<!-- SHEET: Recepción -->
<div class="sheet-overlay" id="sheet-recep">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📦 Recepción de Material</div>
    <input type="hidden" id="recep-req-id">
    <div class="card-label" style="margin-bottom:10px">MATERIALES PENDIENTES DE RECIBIR</div>
    <div id="recep-items-wrap" style="margin-bottom:12px"></div>
    <div class="form-group">
      <label class="form-label">Recibió *</label>
      <input class="form-input" id="recep-recibio" type="text" placeholder="Nombre de quien recibe" list="recibio-list" autocomplete="off">
    </div>
    <label style="display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:13px;color:var(--text)">
      <input type="checkbox" id="recep-parcial" style="width:18px;height:18px">
      Entrega parcial (quedan materiales pendientes)
    </label>
    <div class="form-group">
      <label class="form-label">Ubicación</label>
      <select class="form-input" id="recep-ubicacion">
        <option>Almacén central</option>
        <option>Directo en obra</option>
        <option>Taller</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">No. Factura / Remisión</label>
      <input class="form-input" id="recep-factura" type="text" placeholder="Ej. FAC-00123 o REM-456">
    </div>
    <button class="btn-primary" id="recep-save-btn" onclick="saveRecepcion()" style="margin-bottom:10px">Confirmar recepción</button>
    <button class="btn-secondary" onclick="closeSheet('recep')">Cancelar</button>
    <div style="height:20px"></div>
  </div>
</div>

<!-- SHEET: Editar requisición -->
<div class="sheet-overlay" id="sheet-editar">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">✏️ Editar Requisición</div>
    <div class="form-group">
      <label class="form-label">Obra *</label>
      <select class="form-input" id="edit-obra"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Solicitante</label>
      <input class="form-input" id="edit-solicitante" type="text" readonly style="opacity:0.7;cursor:not-allowed;background:var(--surface)">
    </div>
    <div class="form-group">
      <label class="form-label">Urgencia</label>
      <select class="form-input" id="edit-urgencia">
        <option value="normal">Normal</option>
        <option value="urgente">🔴 Urgente</option>
        <option value="muy_urgente">🚨 Muy urgente</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Fecha requerida</label>
      <input class="form-input" id="edit-fecha" type="date">
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <textarea class="form-input" id="edit-notas" placeholder="Instrucciones especiales..."></textarea>
    </div>
    <div class="card-label" style="margin-bottom:10px">MATERIALES</div>
    <div id="edit-items-list" style="margin-bottom:8px"></div>
    <button class="btn-secondary" onclick="agregarEditItem()" style="margin-bottom:16px">+ Agregar material</button>
    <button class="btn-primary" id="edit-save-btn" onclick="saveEditar()">Guardar cambios</button>
    <button class="btn-secondary" onclick="closeSheet('editar')">Cancelar</button>
    <div style="height:20px"></div>
  </div>
</div>

<!-- PDF OVERLAY -->
<div id="pdf-overlay">
  <div class="pdf-bar">
    <button class="pdf-print-btn" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
    <button class="pdf-close-btn" onclick="document.getElementById('pdf-overlay').classList.remove('open')">✕ Cerrar</button>
  </div>
  <div id="pdf-doc"></div>
</div>
</body>
</html>
